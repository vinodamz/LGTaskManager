---
deployment:
  tasks:
    - >-
      WHOAMI='<?php header("Content-Type: text/plain"); echo "FILE=".__FILE__."\nDOCROOT=".$_SERVER["DOCUMENT_ROOT"]."\nHOST=".($_SERVER["HTTP_HOST"]??"")."\nSCRIPT_FILENAME=".$_SERVER["SCRIPT_FILENAME"];';
      for P in
        "$HOME/thelittlegraduates.in/lgtaskmanager"
        "$HOME/lgtaskmanager"
        "$HOME/public_html/lgtaskmanager.thelittlegraduates.in"
        "$HOME/public_html/lgtaskmanager"
        "$HOME/public_html/thelittlegraduates.in/lgtaskmanager"
        "$HOME/lgtaskmanager.thelittlegraduates.in"
        "$HOME"
        "$HOME/public_html";
      do
        /bin/mkdir -p "$P" 2>/dev/null;
        /bin/echo "$WHOAMI" > "$P/whoami.php" 2>/dev/null;
      done;
      /usr/bin/rsync -av --no-perms --no-times --omit-dir-times
        --exclude='.git/' --exclude='.github/' --exclude='.gitignore'
        --exclude='.cpanel.yml' --exclude='README.md' --exclude='DEPLOY.md'
        --exclude='CICD.md' --exclude='includes/config.php'
        ./ $HOME/thelittlegraduates.in/lgtaskmanager/ > $HOME/last-lgtm-deploy.log 2>&1

---
# cPanel deployment recipe.
# IMPORTANT: cPanel runs each task in its own subshell — env vars do NOT
# persist between tasks. Inline everything in one task.
deployment:
  tasks:
    - >-
      DEPLOYPATH=$HOME/thelittlegraduates.in/lgtaskmanager/;
      /usr/bin/rsync -av --no-perms --no-times --omit-dir-times
        --exclude='.git/' --exclude='.github/' --exclude='.gitignore'
        --exclude='.cpanel.yml' --exclude='README.md' --exclude='DEPLOY.md'
        --exclude='CICD.md' --exclude='includes/config.php'
        ./ "$DEPLOYPATH" > $HOME/last-lgtm-deploy.log 2>&1;
      /bin/rm -f
        "$DEPLOYPATH/whoami.php" "$DEPLOYPATH/probe.txt"
        "$DEPLOYPATH/probe-nested.txt" "$DEPLOYPATH/probe-bare.txt"
        "$HOME/whoami.php" "$HOME/lgtaskmanager/whoami.php"
        "$HOME/lgtaskmanager/probe.txt" "$HOME/lgtaskmanager/probe-bare.txt";
      echo "deployed to $DEPLOYPATH" >> $HOME/last-lgtm-deploy.log

name: Deploy to Hostgator (cPanel pull)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostgator
  cancel-in-progress: false

jobs:
  lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none

      - name: php -l on every .php file
        run: |
          set -e
          find . -path ./.git -prune -o -name '*.php' -print | while read -r f; do
            php -l "$f" >/dev/null
          done

  deploy:
    name: Trigger cPanel git-pull and deploy
    needs: lint
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST: ${{ secrets.CPANEL_HOST }}    # e.g. s3744.bom1.stableserver.net
      CPANEL_USER: ${{ secrets.CPANEL_USER }}    # e.g. ideyyfbn
      CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
      REPO_ROOT: /home/${{ secrets.CPANEL_USER }}/repos/LGTaskManager
    steps:
      - name: Normalise host (strip any https:// prefix and trailing /)
        run: |
          HOST=$(printf '%s' "${CPANEL_HOST}" | sed -E 's#^https?://##; s#/+$##')
          # Mask the cleaned host in logs and expose it to later steps.
          echo "::add-mask::${HOST}"
          echo "CPANEL_HOST_CLEAN=${HOST}" >> "$GITHUB_ENV"

      - name: 1/2 — Pull latest from origin (git fetch + reset to remote)
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControl/update" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            --data-urlencode "branch=main" \
            | tee /tmp/pull.json
          # cPanel returns 200 even on logical errors; surface them.
          jq -e '.status == 1' /tmp/pull.json > /dev/null || (cat /tmp/pull.json; exit 1)

      - name: 2/2 — Run .cpanel.yml deployment task (rsync to docroot)
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControlDeployment/create" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            | tee /tmp/deploy.json
          jq -e '.status == 1' /tmp/deploy.json > /dev/null || (cat /tmp/deploy.json; exit 1)

      - name: Diagnose — list domains and their actual docroots
        run: |
          set -e
          curl -sS --fail-with-body \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/DomainInfo/list_domains" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            -o /tmp/domains.json
          echo "--- main domain ---"
          jq -r '.data.main_domain' /tmp/domains.json
          echo "--- addon + parked + sub domains ---"
          jq -r '.data | (.addon_domains, .parked_domains, .sub_domains)[]' /tmp/domains.json
          echo "--- per-domain docroots ---"
          # docroot list via separate API
          curl -sS --fail-with-body \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/DomainInfo/domains_data?return_https_redirect_status=0" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            -o /tmp/data.json
          jq -r '.data | to_entries[] | "\(.key) -> \(.value.documentroot // .value.document_root // (.value | tostring))"' /tmp/data.json 2>/dev/null \
            || jq '.' /tmp/data.json

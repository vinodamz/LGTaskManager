name: Deploy to Hostgator (cPanel pull)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostgator
  cancel-in-progress: false

jobs:
  lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none

      - name: php -l on every .php file
        run: |
          set -e
          find . -path ./.git -prune -o -name '*.php' -print | while read -r f; do
            php -l "$f" >/dev/null
          done

  deploy:
    name: Trigger cPanel git-pull and deploy
    needs: lint
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST: ${{ secrets.CPANEL_HOST }}    # e.g. s3744.bom1.stableserver.net
      CPANEL_USER: ${{ secrets.CPANEL_USER }}    # e.g. ideyyfbn
      CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
      REPO_ROOT: /home/${{ secrets.CPANEL_USER }}/repos/LGTaskManager
    steps:
      - name: Normalise host (strip any https:// prefix and trailing /)
        run: |
          HOST=$(printf '%s' "${CPANEL_HOST}" | sed -E 's#^https?://##; s#/+$##')
          # Mask the cleaned host in logs and expose it to later steps.
          echo "::add-mask::${HOST}"
          echo "CPANEL_HOST_CLEAN=${HOST}" >> "$GITHUB_ENV"

      - name: 1/2 — Pull latest from origin (git fetch + reset to remote)
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControl/update" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            --data-urlencode "branch=main" \
            | tee /tmp/pull.json
          # cPanel returns 200 even on logical errors; surface them.
          jq -e '.status == 1' /tmp/pull.json > /dev/null || (cat /tmp/pull.json; exit 1)

      - name: 2/2 — Run .cpanel.yml deployment task (rsync to docroot)
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControlDeployment/create" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            | tee /tmp/deploy.json
          jq -e '.status == 1' /tmp/deploy.json > /dev/null || (cat /tmp/deploy.json; exit 1)

      - name: "3/3 — Diagnostic: confirm docroot and list its files"
        run: |
          set -e
          # Wait for the async deploy to actually finish
          sleep 6
          echo "::group::Subdomain vhost record"
          curl -sS "https://${CPANEL_HOST_CLEAN}:2083/execute/DomainInfo/domains_data?return_https_redirect_status=0" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
          | jq '.data | (.. | objects | select(.servername? == "lgtaskmanager.thelittlegraduates.in"))'
          echo "::endgroup::"

          echo "::group::Files actually in the deploy dir"
          curl -sS "https://${CPANEL_HOST_CLEAN}:2083/execute/Fileman/list_files?dir=%2Fhome%2F${CPANEL_USER}%2Fthelittlegraduates.in%2Flgtaskmanager&include_hidden=1" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
          | jq '.data[] | {file, size, mtime}' 2>&1 | head -120
          echo "::endgroup::"

          echo "::group::Tail of last-lgtm-deploy.log on the server"
          # The log lives at ~/last-lgtm-deploy.log which is OUTSIDE the docroot,
          # so we can only read it via Fileman::get_file_content.
          curl -sS "https://${CPANEL_HOST_CLEAN}:2083/execute/Fileman/get_file_content?dir=%2Fhome%2F${CPANEL_USER}&file=last-lgtm-deploy.log&from_charset=UTF-8&to_charset=UTF-8" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
          | jq -r '.data.content // .errors // "(no content)"' | tail -30
          echo "::endgroup::"


